<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="robots" content="noindex, nofollow">
        <style type="text/css">
            body {
              padding: 0;
              margin: 0;
            }

            svg:not(:root) {
              display: block;
            }

            .playable-code {
              background-color: #f4f7f8;
              border: none;
              border-left: 6px solid #558abb;
              border-width: medium medium medium 6px;
              color: #4d4e53;
              height: 100px;
              width: 90%;
              padding: 10px 10px 0;
            }

            .playable-canvas {
              border: 1px solid #4d4e53;
              border-radius: 2px;
            }

            .playable-buttons {
              text-align: right;
              width: 90%;
              padding: 5px 10px 5px 26px;
            }
        </style>
        
        <style type="text/css">
            /* Zeichnet jeden markierten Text gelb auf rotem Hintergrund */
::-moz-selection {
  color: gold; background: red;
}

::selection {
  color: gold; background: red;
}

/* Zeichnet markierten Text innerhalb von Absätzen weiß auf schwarz */
p::-moz-selection {
  color: white;
  background: black;
}

p::selection {
  color: white;
  background: black;
}
        </style>
        
        <title>::selection - beispiel - code sample</title>
    </head>
    <body>
        
            <div>Dies ist etwas Text für dich, um CSS' ::selection Pseudoklasse zu testen.</div>
<p>Versuche auch, etwas Text in diesem &lt;p&gt;</p> zu markieren
        
        
    </body>
</html>
