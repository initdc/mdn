<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="robots" content="noindex, nofollow">
        <style type="text/css">
            body {
              padding: 0;
              margin: 0;
            }

            svg:not(:root) {
              display: block;
            }

            .playable-code {
              background-color: #f4f7f8;
              border: none;
              border-left: 6px solid #558abb;
              border-width: medium medium medium 6px;
              color: #4d4e53;
              height: 100px;
              width: 90%;
              padding: 10px 10px 0;
            }

            .playable-canvas {
              border: 1px solid #4d4e53;
              border-radius: 2px;
            }

            .playable-buttons {
              text-align: right;
              width: 90%;
              padding: 5px 10px 5px 26px;
            }
        </style>
        
        <style type="text/css">
            ol {
  counter-reset: section;                /* Erstellt mit jedem ol Element
                                            eine neue Instanz des
                                            Abschnittszählers. */
  list-style-type: none;
}

li::before {
  counter-increment: section;            /* Inkrementiert nur diese Instanz
                                            des Abschnittszählers. */
  content: counters(section,".") " ";    /* Fügt den Wert aller Instanzen
                                            des Abschnittszählers durch "."
                                            getrennt hinzu. */
                                         /* Falls < IE8 unterstützt werden soll,
                                            sollte sichergestellt werden, dass
                                            kein Leerzeichen nach dem ',' steht. */
}

        </style>
        
        <title>CSS Zähler verwenden - zähler_verschachteln - code sample</title>
    </head>
    <body>
        
            <ol>
  <li>Eintrag</li>          <!-- 1     -->
  <li>Eintrag               <!-- 2     -->
    <ol>
      <li>Eintrag</li>      <!-- 2.1   -->
      <li>Eintrag</li>      <!-- 2.2   -->
      <li>Eintrag           <!-- 2.3   -->
        <ol>
          <li>Eintrag</li>  <!-- 2.3.1 -->
          <li>Eintrag</li>  <!-- 2.3.2 -->
        </ol>
        <ol>
          <li>Eintrag</li>  <!-- 2.3.1 -->
          <li>Eintrag</li>  <!-- 2.3.2 -->
          <li>Eintrag</li>  <!-- 2.3.3 -->
        </ol>
      </li>
      <li>Eintrag</li>      <!-- 2.4   -->
    </ol>
  </li>
  <li>Eintrag</li>          <!-- 3     -->
  <li>Eintrag</li>          <!-- 4     -->
</ol>
<ol>
  <li>Eintrag</li>          <!-- 1     -->
  <li>Eintrag</li>          <!-- 2     -->
</ol>
        
        
    </body>
</html>
