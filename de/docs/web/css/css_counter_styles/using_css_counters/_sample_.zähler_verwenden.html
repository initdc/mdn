<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="robots" content="noindex, nofollow">
        <style type="text/css">
            body {
              padding: 0;
              margin: 0;
            }

            svg:not(:root) {
              display: block;
            }

            .playable-code {
              background-color: #f4f7f8;
              border: none;
              border-left: 6px solid #558abb;
              border-width: medium medium medium 6px;
              color: #4d4e53;
              height: 100px;
              width: 90%;
              padding: 10px 10px 0;
            }

            .playable-canvas {
              border: 1px solid #4d4e53;
              border-radius: 2px;
            }

            .playable-buttons {
              text-align: right;
              width: 90%;
              padding: 5px 10px 5px 26px;
            }
        </style>
        
        <style type="text/css">
            body {
  counter-reset: section;                      /* Setzt den Abschnittszähler auf 0 */
}

h3::before {
  counter-increment: section;                  /* Erhöht den Abschnittszähler */
  content: "Abschnitt " counter(section) ": "; /* Zeigt den Zähler an */
}

        </style>
        
        <title>CSS Zähler verwenden - zähler_verwenden - code sample</title>
    </head>
    <body>
        
            <h3>Einführung</h3>
<h3>Inhalt</h3>
<h3>Zusammenfassung</h3>
        
        
    </body>
